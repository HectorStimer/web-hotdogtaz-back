version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: hotdogtaz-db
    environment:
      POSTGRES_DB: hotdogtaz
      POSTGRES_USER: hotdogtaz
      POSTGRES_PASSWORD: hotdogtaz123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: hotdogtaz-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/hotdogtaz
      KC_DB_USERNAME: hotdogtaz
      KC_DB_PASSWORD: hotdogtaz123
    ports:
      - "8180:8080"
    depends_on:
      - postgres
    command: start-dev

volumes:
  postgres_data: