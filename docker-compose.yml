services:
  postgres:
    image: postgres:16
    container_name: hotdogtaz-db
    environment:
      POSTGRES_DB: hotdogtaz
      POSTGRES_USER: hotdogtaz
      POSTGRES_PASSWORD: hotdogtaz123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotdogtaz"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: hotdogtaz-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/hotdogtaz
      KC_DB_USERNAME: hotdogtaz
      KC_DB_PASSWORD: hotdogtaz123
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev

  backend:
    build: .
    container_name: hotdogtaz-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/hotdogtaz
      DB_USERNAME: hotdogtaz
      DB_PASSWORD: hotdogtaz123
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/hotdogtaz
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KEYCLOAK_REALM: hotdogtaz
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  postgres_data:
